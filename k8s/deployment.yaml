apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-monitor-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-monitor
  template:
    metadata:
      labels:
        app: go-monitor
    spec:
      serviceAccountName: go-monitor-sa
      containers:
        - name: go-monitor
          image: yourrepo/go-monitor:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_DEPLOYMENT
              value: go-monitor-app
            - name: SCALE_UP_THRESHOLD
              value: "75"
            - name: SCALE_DOWN_THRESHOLD
              value: "25"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: go-monitor-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: go-monitor-scaler
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: go-monitor-scaler-binding
subjects:
  - kind: ServiceAccount
    name: go-monitor-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: go-monitor-scaler
  apiGroup: rbac.authorization.k8s.io